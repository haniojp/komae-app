<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="狛江カウントダウン">
<meta name="theme-color" content="#0a0f1e">
<title>Smart Transit Countdown</title>
<link rel="manifest" href="manifest.json">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:#0a0f1e; --bg2:#111827; --bg3:#1a2235; --card:#1e2d45;
  --border:rgba(255,255,255,0.08); --text:#f0f4ff; --muted:#8899bb;
  --accent:#3b82f6; --green:#22c55e; --yellow:#eab308; --red:#ef4444;
}
html,body { height:100%; background:var(--bg); color:var(--text);
  font-family:-apple-system,'Helvetica Neue',sans-serif; overflow-x:hidden; }
body { display:flex; flex-direction:column; min-height:100vh;
  min-height:-webkit-fill-available;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }

.header { padding:14px 20px 6px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.header-title { font-size:13px; font-weight:600; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; }
.header-dest { font-size:13px; font-weight:700; color:var(--accent);
  background:rgba(59,130,246,.12); padding:4px 10px; border-radius:20px;
  border:1px solid rgba(59,130,246,.3); }

.train-bar { margin:4px 16px 0; background:var(--bg3); border-radius:12px;
  padding:10px 16px; display:flex; align-items:center; justify-content:space-between;
  border:1px solid var(--border); flex-shrink:0; gap:8px; }
.tb-item { text-align:center; }
.tb-label { font-size:10px; color:var(--muted); margin-bottom:2px; }
.tb-value { font-size:15px; font-weight:700; color:var(--text); }
.tb-div { width:1px; height:32px; background:var(--border); }
.train-badge { font-size:11px; font-weight:700; padding:3px 8px; border-radius:6px;
  background:rgba(59,130,246,.2); color:#60a5fa; border:1px solid rgba(59,130,246,.3); }

.countdown-section { flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center; padding:8px 20px; }
.cd-label { font-size:11px; font-weight:600; letter-spacing:.15em;
  text-transform:uppercase; color:var(--muted); margin-bottom:8px; }

.cd-ring { position:relative; width:210px; height:210px; margin-bottom:14px; }
.cd-ring svg { position:absolute; top:0; left:0; transform:rotate(-90deg); }
.ring-bg { fill:none; stroke:rgba(255,255,255,.06); stroke-width:6; }
.ring-fg { fill:none; stroke-width:6; stroke-linecap:round; transition:stroke-dashoffset 1s linear,stroke .5s ease; }
.cd-inner { position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; }
.cd-time { font-size:56px; font-weight:700; font-variant-numeric:tabular-nums;
  letter-spacing:-2px; transition:color .5s ease; line-height:1; }
.cd-sub { font-size:11px; color:var(--muted); margin-top:4px; }

.map-btn { display:flex; align-items:center; gap:8px;
  background:rgba(59,130,246,.15); border:1.5px solid rgba(59,130,246,.4);
  color:#60a5fa; font-size:15px; font-weight:600; padding:11px 26px;
  border-radius:50px; cursor:pointer; text-decoration:none; transition:all .2s; }
.map-btn:active { transform:scale(.96); background:rgba(59,130,246,.25); }
.map-btn svg { width:17px; height:17px; }

.cards { padding:0 14px 14px; display:flex; flex-direction:column; gap:8px; flex-shrink:0; }
.card-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:11px 13px; }
.c-label { font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase;
  color:var(--muted); margin-bottom:4px; display:flex; align-items:center; gap:4px; }
.c-val { font-size:15px; font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.c-val.sm { font-size:13px; }
.c-val.ac { color:#60a5fa; }
.c-val.gr { color:var(--green); }

.card-wide { background:var(--card); border:1px solid var(--border); border-radius:14px;
  padding:11px 14px; display:flex; align-items:center; justify-content:space-between; }
.home-time { font-size:22px; font-weight:700; color:var(--green); }
.home-note { font-size:10px; color:var(--muted); margin-top:2px; }

.overlay { position:fixed; inset:0; background:var(--bg); display:flex;
  flex-direction:column; align-items:center; justify-content:center;
  z-index:100; gap:16px; padding:40px; }
.overlay.hidden { display:none; }
.spinner { width:40px; height:40px; border:3px solid rgba(59,130,246,.2);
  border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.ov-text { font-size:16px; font-weight:500; color:var(--muted); text-align:center; line-height:1.7; }
.retry-btn { background:none; border:1px solid var(--border); color:var(--muted);
  font-size:13px; padding:8px 20px; border-radius:20px; cursor:pointer; margin-top:4px; }

.notice { position:fixed; top:56px; left:16px; right:16px;
  background:rgba(234,179,8,.15); border:1px solid rgba(234,179,8,.4);
  border-radius:12px; padding:10px 16px; font-size:13px; font-weight:600;
  color:#fbbf24; text-align:center; z-index:50;
  opacity:0; transform:translateY(-8px); transition:all .3s; pointer-events:none; }
.notice.show { opacity:1; transform:translateY(0); }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.55} }
.urgent { animation:pulse 1s ease-in-out infinite; }
</style>
</head>
<body>

<div class="overlay" id="overlay">
  <div class="spinner" id="spin"></div>
  <div class="ov-text" id="ovText">現在地を取得中…<br>位置情報の許可をお願いします</div>
  <button class="retry-btn" id="retryBtn" style="display:none" onclick="init()">再試行する</button>
</div>

<div class="notice" id="notice"></div>

<div class="header">
  <div class="header-title">Smart Transit</div>
  <div class="header-dest">🚉 狛江駅 行き</div>
</div>

<div class="train-bar">
  <div class="tb-item">
    <div class="tb-label">乗車駅</div>
    <div class="tb-value" id="depStation">—</div>
  </div>
  <div class="tb-div"></div>
  <div class="tb-item">
    <div class="tb-label">出発時刻</div>
    <div class="tb-value" id="depTime">—:—</div>
  </div>
  <div class="tb-div"></div>
  <div class="tb-item">
    <div class="tb-label">種別</div>
    <div class="train-badge" id="trainType">—</div>
  </div>
</div>

<div class="countdown-section">
  <div class="cd-label">出発まで</div>
  <div class="cd-ring">
    <svg viewBox="0 0 210 210" width="210" height="210">
      <circle class="ring-bg" cx="105" cy="105" r="96"/>
      <circle class="ring-fg" id="ringFg" cx="105" cy="105" r="96"
        stroke-dasharray="603" stroke-dashoffset="0"/>
    </svg>
    <div class="cd-inner">
      <div class="cd-time" id="cdTime">—:——</div>
      <div class="cd-sub" id="cdSub">計算中...</div>
    </div>
  </div>
  <a class="map-btn" href="#" onclick="openMap(event)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6-3V7m6 16l4.553-2.276A1 1 0 0021 19.382V8.618a1 1 0 00-.553-.894L15 5m0 15V5m0 0L9 7"/>
    </svg>
    地図で経路を見る
  </a>
</div>

<div class="cards">
  <div class="card-row">
    <div class="card">
      <div class="c-label">📍 現在地</div>
      <div class="c-val sm" id="curLoc">取得中...</div>
    </div>
    <div class="card">
      <div class="c-label">🚉 最寄り駅</div>
      <div class="c-val ac" id="nearSt">—</div>
    </div>
  </div>
  <div class="card-row">
    <div class="card">
      <div class="c-label">🚶 徒歩時間</div>
      <div class="c-val" id="walkT">— 分</div>
    </div>
    <div class="card">
      <div class="c-label">🕐 次の電車</div>
      <div class="c-val ac" id="nextT">—:—</div>
    </div>
  </div>
  <div class="card-wide">
    <div>
      <div class="c-label">🏠 自宅到着予定</div>
      <div class="home-time" id="homeArr">—:—</div>
      <div class="home-note">狛江駅着 +10分</div>
    </div>
    <div style="text-align:right">
      <div class="c-label" style="justify-content:flex-end">🎯 狛江駅 着</div>
      <div class="c-val ac" style="font-size:18px" id="komaeArr">—:—</div>
      <div class="home-note" id="routeNote">小田急線</div>
    </div>
  </div>
</div>

<script>
// ============================================================

  {h:21,m:2,type:'各停'},{h:21,m:17,type:'各停'},{h:21,m:32,type:'各停'},
  {h:21,m:47,type:'各停'},{h:22,m:2,type:'各停'},{h:22,m:20,type:'各停'},

  {h:23,m:35,type:'各停'},{h:23,m:58,type:'各停'},{h:0,m:20,type:'各停'},
];

// 土休日
const KOMAE_ARR_HOLIDAY = [
  {h:5,m:47,type:'各停'},{h:6,m:7,type:'各停'},{h:6,m:30,type:'各停'},
  {h:6,m:50,type:'各停'},{h:7,m:10,type:'各停'},{h:7,m:30,type:'各停'},

];

// 各駅から狛江駅までの所要時間（分）
// 小田急線 各停で狛江駅まで
const STATION_TO_KOMAE_MIN = {
  '新宿':    45,
  '南新宿':  43,
  '参宮橋':  41,
  '代々木八幡': 39,

};

// 各駅の座標
const STATIONS = [

// ============================================================
// State
// ============================================================
let S = {
  lat:null, lng:null, locName:'取得中...', station:null,
  distM:0, walkMin:0, walkSec:0,
  trainIdx:0, countSec:0, interval:null
};

function isHoliday() { const d=new Date().getDay(); return d===0||d===6; }
function timetable()  { return isHoliday() ? KOMAE_ARR_HOLIDAY : KOMAE_ARR_WEEKDAY; }

function pad(n){ return String(n).padStart(2,'0'); }
function fmt(h,m){ return `${pad(h)}:${pad(m)}`; }
function addMin(str,add){
  const [h,m]=str.split(':').map(Number);
  const t=h*60+m+add; return `${pad(Math.floor(t/60)%24)}:${pad(t%60)}`;
}
function toSec(h,m){ return h*3600+m*60; }
function nowSec(){ const n=new Date(); return n.getHours()*3600+n.getMinutes()*60+n.getSeconds(); }

// ============================================================
// GPS & Geocode
// ============================================================
function init(){
  show('現在地を取得中…\n位置情報の許可をお願いします', true);
  document.getElementById('retryBtn').style.display='none';
  if(!navigator.geolocation){ showErr('位置情報が使えません'); return; }
  navigator.geolocation.getCurrentPosition(
    pos=>{ S.lat=pos.coords.latitude; S.lng=pos.coords.longitude;
           show('場所を特定中...', true); geocode(); },
    ()=>{ S.lat=35.6510; S.lng=139.6257; S.locName='経堂周辺（GPS失敗）'; compute(); },
    {enableHighAccuracy:true, timeout:12000, maximumAge:60000}
  );
}

async function geocode(){
  try {
    const r = await fetch(
      `https://mreversegeocoder.gsi.go.jp/reverse-geocoder/LonLatToAddress?lon=${S.lng}&lat=${S.lat}`
    );
    const d = await r.json();
    S.locName = d?.results?.lv01Nm || '現在地';
  } catch(e){ S.locName='現在地'; }
  compute();
}

// ============================================================
// 最寄り駅を探す
// ============================================================
function findNearest(){
  let min=Infinity, best=STATIONS[0];
  for(const st of STATIONS){
    const d=dist(S.lat,S.lng,st.lat,st.lng);
    if(d<min){ min=d; best=st; }
  }
  return {st:best, distM:Math.round(min)};
}

function dist(la1,lo1,la2,lo2){
  const R=6371000, dLa=(la2-la1)*Math.PI/180, dLo=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ============================================================
// 次の電車を探す
// 「最寄り駅の出発時刻」= 狛江着時刻 - 最寄り駅から狛江までの所要時間
// カウントダウン = 最寄り駅出発時刻 - 現在時刻 - 徒歩時間
// ============================================================
function findTrain(walkTotalSec, startIdx){
  const tbl = timetable();
  const ns = nowSec();
  // 最低でも「今から徒歩時間+1分」後に出発する電車を探す
  const neededDepSec = ns + walkTotalSec + 60;

  for(let i=startIdx; i<tbl.length+startIdx; i++){
    const idx = i % tbl.length;
    const t = tbl[idx];
    // 狛江着 → 最寄り駅発 = 狛江着 - toKomae分
    let depSec = toSec(t.h, t.m) - S.station.toKomae * 60;
    // 日付をまたぐ補正
    if(depSec < 0) depSec += 86400;
    if(depSec >= neededDepSec){
      return {idx, train:t, depSec};
    }
  }
  // 見つからなければ最初の電車
  const t = tbl[0];
  let depSec = toSec(t.h,t.m) - S.station.toKomae*60 + 86400;
  return {idx:0, train:t, depSec};
}

// ============================================================
// 計算・開始
// ============================================================
function compute(){
  const {st, distM} = findNearest();
  S.station = st; S.distM = distM;
  const walkTotalSec = Math.ceil(distM / 60 * 60); // 60m/分
  S.walkMin = Math.floor(walkTotalSec/60);
  S.walkSec = walkTotalSec % 60;

  const {idx, train, depSec} = findTrain(walkTotalSec, 0);
  S.trainIdx = idx;

  // カウントダウン = 最寄り駅出発時刻 - 現在時刻 - 徒歩時間
  S.countSec = Math.max(0, depSec - nowSec() - walkTotalSec);

  updateUI(train);
  hide();
  if(S.interval) clearInterval(S.interval);
  S.interval = setInterval(()=>tick(walkTotalSec), 1000);
}

function tick(walkTotalSec){
  S.countSec--;
  // 5分（300秒）を切ったら次の電車へ
  if(S.countSec <= 300){
    const {idx, train, depSec} = findTrain(walkTotalSec, (S.trainIdx+1));
    S.trainIdx = idx;
    S.countSec = Math.max(0, depSec - nowSec() - walkTotalSec);
    updateUI(train);
    notify(`⏭ 次の電車 ${fmtTrain(train)} に切り替えました`);
    return;
  }
  updateCD();
}

function fmtTrain(t){
  const tbl = timetable();
  // 最寄り駅発時刻を計算
  let depMin = t.h*60+t.m - S.station.toKomae;
  if(depMin<0) depMin+=1440;
  return fmt(Math.floor(depMin/60), depMin%60);
}

// ============================================================
// UI
// ============================================================
function updateUI(train){
  // 最寄り駅の発車時刻
  let depTotalMin = train.h*60+train.m - S.station.toKomae;
  if(depTotalMin<0) depTotalMin+=1440;
  const depH=Math.floor(depTotalMin/60), depM=depTotalMin%60;

  document.getElementById('curLoc').textContent   = S.locName;
  document.getElementById('nearSt').textContent   = S.station.name+'駅';
  document.getElementById('walkT').textContent    = S.walkSec>0 ? `${S.walkMin}分${S.walkSec}秒` : `${S.walkMin}分`;
  document.getElementById('depStation').textContent = S.station.name;
  document.getElementById('depTime').textContent  = fmt(depH,depM);
  document.getElementById('trainType').textContent= train.type;
  document.getElementById('nextT').textContent    = fmt(depH,depM);
  document.getElementById('komaeArr').textContent = fmt(train.h,train.m);
  document.getElementById('routeNote').textContent= `小田急線 ${train.type}`;

  const homeArr = addMin(fmt(train.h,train.m), 10);
  document.getElementById('homeArr').textContent  = homeArr;

  updateCD();
}

function updateCD(){
  const s=S.countSec;
  const m=Math.floor(s/60), sec=s%60;
  document.getElementById('cdTime').textContent = `${pad(m)}:${pad(sec)}`;

  let color = s>600 ? '#22c55e' : s>300 ? '#eab308' : s>120 ? '#f97316' : '#ef4444';
  document.getElementById('cdTime').style.color = color;
  document.getElementById('cdTime').classList.toggle('urgent', s<=120);

  const maxSec=25*60, ratio=Math.min(s/maxSec,1);
  const ring=document.getElementById('ringFg');
  ring.style.strokeDashoffset = 603*(1-ratio);
  ring.style.stroke = color;

  document.getElementById('cdSub').textContent =
    s<=0?'出発時刻です！': s<=120?'急いで！': s<=300?'そろそろ準備を': '余裕あり';
}

function openMap(e){
  e.preventDefault();
  const url=`https://www.google.com/maps/dir/?api=1&origin=${S.lat},${S.lng}&destination=35.6219,139.5655&travelmode=walking`;
  window.open(url,'_blank');
}

function notify(msg){
  const el=document.getElementById('notice');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3500);
}
function show(msg,spin){
  document.getElementById('overlay').classList.remove('hidden');
  document.getElementById('ovText').textContent=msg;
  document.getElementById('spin').style.display=spin?'block':'none';
}
function hide(){ document.getElementById('overlay').classList.add('hidden'); }
function showErr(msg){
  document.getElementById('spin').style.display='none';
  document.getElementById('ovText').textContent=msg;
  document.getElementById('retryBtn').style.display='block';
}

if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
window.addEventListener('load', init);
</script>
