<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="狛江カウントダウン">
<meta name="theme-color" content="#0a0f1e">
<title>Smart Transit Countdown</title>
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0f1e;--bg3:#1a2235;--card:#1e2d45;--border:rgba(255,255,255,.08);
  --text:#f0f4ff;--muted:#8899bb;--accent:#3b82f6;--green:#22c55e;--yellow:#eab308;--red:#ef4444}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:-apple-system,'Helvetica Neue',sans-serif;overflow-x:hidden}
body{display:flex;flex-direction:column;min-height:100vh;min-height:-webkit-fill-available;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
.header{padding:14px 20px 6px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header-title{font-size:13px;font-weight:600;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.header-dest{font-size:13px;font-weight:700;color:var(--accent);background:rgba(59,130,246,.12);
  padding:4px 10px;border-radius:20px;border:1px solid rgba(59,130,246,.3)}
.train-bar{margin:4px 16px 0;background:var(--bg3);border-radius:12px;padding:10px 16px;
  display:flex;align-items:center;justify-content:space-between;border:1px solid var(--border);flex-shrink:0}
.tb-label{font-size:10px;color:var(--muted);margin-bottom:2px}
.tb-value{font-size:15px;font-weight:700;color:var(--text)}
.tb-div{width:1px;height:32px;background:var(--border)}
.train-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;
  background:rgba(59,130,246,.2);color:#60a5fa;border:1px solid rgba(59,130,246,.3)}
.countdown-section{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 20px}
.cd-label{font-size:11px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.cd-ring{position:relative;width:210px;height:210px;margin-bottom:14px}
.cd-ring svg{position:absolute;top:0;left:0;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:rgba(255,255,255,.06);stroke-width:6}
.ring-fg{fill:none;stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset 1s linear,stroke .5s ease}
.cd-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.cd-time{font-size:56px;font-weight:700;font-variant-numeric:tabular-nums;
  letter-spacing:-2px;transition:color .5s ease;line-height:1}
.cd-sub{font-size:11px;color:var(--muted);margin-top:4px}
.map-btn{display:flex;align-items:center;gap:8px;background:rgba(59,130,246,.15);
  border:1.5px solid rgba(59,130,246,.4);color:#60a5fa;font-size:15px;font-weight:600;
  padding:11px 26px;border-radius:50px;cursor:pointer;text-decoration:none;transition:all .2s}
.map-btn:active{transform:scale(.96);background:rgba(59,130,246,.25)}
.map-btn svg{width:17px;height:17px}
.cards{padding:0 14px 14px;display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.card-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:11px 13px}
.c-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);margin-bottom:4px}
.c-val{font-size:15px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-val.sm{font-size:13px}.c-val.ac{color:#60a5fa}.c-val.gr{color:var(--green)}
.card-wide{background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:11px 14px;display:flex;align-items:center;justify-content:space-between}
.home-time{font-size:22px;font-weight:700;color:var(--green)}
.home-note{font-size:10px;color:var(--muted);margin-top:2px}
.overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:100;gap:16px;padding:40px}
.overlay.hidden{display:none}
.spinner{width:40px;height:40px;border:3px solid rgba(59,130,246,.2);
  border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ov-text{font-size:16px;font-weight:500;color:var(--muted);text-align:center;line-height:1.7}
.retry-btn{background:none;border:1px solid var(--border);color:var(--muted);
  font-size:13px;padding:8px 20px;border-radius:20px;cursor:pointer;margin-top:4px}
.notice{position:fixed;top:56px;left:16px;right:16px;background:rgba(234,179,8,.15);
  border:1px solid rgba(234,179,8,.4);border-radius:12px;padding:10px 16px;
  font-size:13px;font-weight:600;color:#fbbf24;text-align:center;z-index:50;
  opacity:0;transform:translateY(-8px);transition:all .3s;pointer-events:none}
.notice.show{opacity:1;transform:translateY(0)}
.route-tag{font-size:10px;color:var(--muted);margin-top:3px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
.urgent{animation:pulse 1s ease-in-out infinite}
</style>
</head>
<body>
<div class="overlay" id="overlay">
  <div class="spinner" id="spin"></div>
  <div class="ov-text" id="ovText">現在地を取得中…<br>位置情報の許可をお願いします</div>
  <button class="retry-btn" id="retryBtn" style="display:none" onclick="init()">再試行する</button>
</div>
<div class="notice" id="notice"></div>
<div class="header">
  <div class="header-title">Smart Transit</div>
  <div class="header-dest">🚉 狛江駅 行き</div>
</div>
<div class="train-bar">
  <div><div class="tb-label">乗車駅</div><div class="tb-value" id="depStation">—</div></div>
  <div class="tb-div"></div>
  <div><div class="tb-label">出発時刻</div><div class="tb-value" id="depTime">—:—</div></div>
  <div class="tb-div"></div>
  <div><div class="tb-label">種別</div><div class="train-badge" id="trainType">—</div></div>
</div>
<div class="countdown-section">
  <div class="cd-label">出発まで</div>
  <div class="cd-ring">
    <svg viewBox="0 0 210 210" width="210" height="210">
      <circle class="ring-bg" cx="105" cy="105" r="96"/>
      <circle class="ring-fg" id="ringFg" cx="105" cy="105" r="96" stroke-dasharray="603" stroke-dashoffset="0"/>
    </svg>
    <div class="cd-inner">
      <div class="cd-time" id="cdTime">—:——</div>
      <div class="cd-sub" id="cdSub">計算中...</div>
    </div>
  </div>
  <a class="map-btn" href="#" onclick="openMap(event)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6-3V7m6 16l4.553-2.276A1 1 0 0021 19.382V8.618a1 1 0 00-.553-.894L15 5m0 15V5m0 0L9 7"/>
    </svg>
    地図で経路を見る
  </a>
</div>
<div class="cards">
  <div class="card-row">
    <div class="card">
      <div class="c-label">📍 現在地</div>
      <div class="c-val sm" id="curLoc">取得中...</div>
    </div>
    <div class="card">
      <div class="c-label">🚉 最寄り駅</div>
      <div class="c-val ac" id="nearSt">—</div>
    </div>
  </div>
  <div class="card-row">
    <div class="card">
      <div class="c-label">🚶 徒歩時間</div>
      <div class="c-val" id="walkT">— 分</div>
    </div>
    <div class="card">
      <div class="c-label">🕐 小田急 出発</div>
      <div class="c-val ac" id="nextT">—:—</div>
    </div>
  </div>
  <div class="card-wide">
    <div>
      <div class="c-label">🏠 自宅到着予定</div>
      <div class="home-time" id="homeArr">—:—</div>
      <div class="home-note">狛江駅着 +10分</div>
    </div>
    <div style="text-align:right">
      <div class="c-label" style="justify-content:flex-end">🎯 狛江駅 着</div>
      <div class="c-val ac" style="font-size:18px" id="komaeArr">—:—</div>
      <div class="route-tag" id="routeNote">—</div>
    </div>
  </div>
</div>

let S = {
  lat:null,lng:null,locName:'取得中...',

  trainIdx:0,countSec:0,interval:null,depSec:0

function isHoliday(){ const d=new Date().getDay(); return d===0||d===6; }
function timetable(){ return isHoliday()?KOMAE_ARR_HOLIDAY:KOMAE_ARR_WEEKDAY; }
function pad(n){ return String(n).padStart(2,'0'); }

function fmt(h,m){ 
  let hm = Math.floor(h) % 24;
  if(hm < 0) hm += 24;
  return `${pad(hm)}:${pad(m)}`; 
}
function addMin(str,add){
  const[h,m]=str.split(':').map(Number),t=h*60+m+add;
  return `${pad(Math.floor(t/60)%24)}:${pad(t%60)}`;
}

// 鉄道の1日の区切りを深夜4時とし、現在時刻を「当日4:00からの経過秒数」で管理
function getNowAbsoluteSec() {
  const d = new Date();
  let h = d.getHours();
  if (h < 4) h += 24;
  return h * 3600 + d.getMinutes() * 60 + d.getSeconds();
}

function getTrainAbsoluteSec(t) {
  let h = t.h < 4 ? t.h + 24 : t.h;
  return h * 3600 + t.m * 60;
}

// ============================================================
// GPS
// ============================================================
function init(){
  show('現在地を取得中…\n位置情報の許可をお願いします',true);
  document.getElementById('retryBtn').style.display='none';
  if(!navigator.geolocation){ showErr('位置情報が使えません'); return; }
  navigator.geolocation.getCurrentPosition(
    pos=>{ S.lat=pos.coords.latitude; S.lng=pos.coords.longitude;
           show('場所を特定中...',true); geocode(); },
    ()=>{ S.lat=35.6499; S.lng=139.6248; S.locName='経堂周辺（GPS失敗）'; computeSafe(); },
    {enableHighAccuracy:true,timeout:12000,maximumAge:60000}
  );
}

async function geocode(){
  try {
    const r=await fetch(`https://mreversegeocoder.gsi.go.jp/reverse-geocoder/LonLatToAddress?lon=${S.lng}&lat=${S.lat}`);
    const d=await r.json();
    if(d&&d.results){
      const city=d.results.muniNm||''; const town=d.results.lv01Nm||'';
      S.locName=(city+town)||'現在地';
    } else S.locName='現在地';
  } catch(e){
    try {
      const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${S.lat}&lon=${S.lng}&format=json&accept-language=ja`);
      const d=await r.json();
      if(d&&d.address){
        const a=d.address;
        const city=a.city||a.town||a.village||'';
        const ward=a.city_district||a.suburb||a.neighbourhood||'';
        S.locName=(ward?ward+' ':'')+city||'現在地';
      } else S.locName='現在地';
    } catch(e2){ S.locName='現在地'; }
  }
  computeSafe();
}

function findNearest(){
  let min=Infinity, best=STATION_DB[0];
  for(const st of STATION_DB){
    const d=dist(S.lat,S.lng,st.lat,st.lng);
    if(d<min){ min=d; best=st; }
  }
  return {st:best, distM:Math.round(min)};
}

function dist(la1,lo1,la2,lo2){
  const R=6371000,dLa=(la2-la1)*Math.PI/180,dLo=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ============================================================
// 最寄り駅から狛江までの電車を検索（小田急/他路線分岐対応）
// ============================================================
function computeSafe() {
  try { compute(); } catch(e) { showErr('計算エラーが発生しました'); }
}

function findTrain(walkSec, st, startIdx) {
  const tbl = timetable();
  const ns = getNowAbsoluteSec();

  const isOdakyu = st.line === '小田急線';
  // 小田急線沿線の場合は狛江までの時間、他路線の場合は新宿経由の時間を計算
  const transitSec = isOdakyu 
    ? (29 * 60) - (st.toShinjuku * 60) 
    : (st.toShinjuku * 60) + (29 * 60);

  for (let i = 0; i <= tbl.length; i++) {
    const idx = (startIdx + i) % tbl.length;
    const t = tbl[idx];
    
    let komaeArrSec = getTrainAbsoluteSec(t);
    if (startIdx + i >= tbl.length) komaeArrSec += 86400; // 翌日扱い補正

    const depSec = komaeArrSec - transitSec;

    // 現在時刻 + 徒歩時間 + 1分の猶予
    if (depSec >= ns + walkSec + 60) {
        return {idx, train:t, komaeArrSec, depSec};
    }
  }

  const fallback = tbl[0];
  const komaeArrSec = getTrainAbsoluteSec(fallback) + 86400;
  return {idx:0, train:fallback, komaeArrSec, depSec: komaeArrSec - transitSec};
}

// ============================================================
// 計算・開始
// ============================================================
function compute(){
  const {st, distM} = findNearest();
  S.nearestSt = st; 
  S.distM = distM;
  
  // 徒歩時間は不動産基準（分速80m）で算出
  const walkTotalSec = Math.ceil((distM / 80) * 60); 
  S.walkMin = Math.floor(walkTotalSec / 60);
  S.walkSec = walkTotalSec % 60;

  const {idx, train, komaeArrSec, depSec} = findTrain(walkTotalSec, st, 0);
  S.trainIdx = idx;
  S.depSec = depSec;

  // カウントダウン = 最寄り駅出発時刻 - 現在時刻 - 徒歩時間
  S.countSec = Math.max(0, depSec - getNowAbsoluteSec() - walkTotalSec);

  updateUI(train, komaeArrSec, depSec, walkTotalSec, st);
  hide();
  
  if(S.interval) clearInterval(S.interval);
  S.interval = setInterval(() => tick(walkTotalSec, st), 1000);
}

function tick(walkSec, st){
  const ns = getNowAbsoluteSec();
  const currentRemaining = S.depSec - ns - walkSec;
  
  if (currentRemaining <= 0) {
    const {idx, train, komaeArrSec, depSec} = findTrain(walkSec, st, S.trainIdx + 1);
    S.trainIdx = idx;
    S.depSec = depSec;
    updateUI(train, komaeArrSec, depSec, walkSec, st);
    notify(`⏭ 次の電車に切り替えました（狛江着 ${fmt(train.h, train.m)}）`);
    return;
  }
  
  S.countSec = currentRemaining;
  updateCD();
}

// ============================================================
// UI
// ============================================================
function updateUI(train, komaeArrSec, depSec, walkSec, st){
  const depH = Math.floor(depSec / 3600);
  const depM = Math.floor((depSec % 3600) / 60);

  const shinjukuDepSec = komaeArrSec - 29 * 60;
  const snjH = Math.floor(shinjukuDepSec / 3600);
  const snjM = Math.floor((shinjukuDepSec % 3600) / 60);

  const isOdakyu = st.line === '小田急線';
  const routeNote = isOdakyu ? `小田急線 ${train.type}` : `${st.line} → 新宿 → 小田急線 ${train.type}`;

  document.getElementById('curLoc').textContent = S.locName;
  document.getElementById('nearSt').textContent = st.name + '駅';
  document.getElementById('walkT').textContent = S.walkSec > 0 ? `${S.walkMin}分${S.walkSec}秒` : `${S.walkMin}分`;
  
  // 常に最寄り駅を出発駅とする
  document.getElementById('depStation').textContent = st.name;
  document.getElementById('depTime').textContent = fmt(depH, depM);
  document.getElementById('trainType').textContent = isOdakyu ? train.type : '乗換あり';
  
  // 小田急出発のカード：小田急沿線なら最寄り駅の出発時刻、それ以外なら新宿の出発時刻を表示
  document.getElementById('nextT').textContent = isOdakyu ? fmt(depH, depM) : fmt(snjH, snjM);
  document.getElementById('komaeArr').textContent = fmt(train.h, train.m);
  document.getElementById('routeNote').textContent = routeNote;
  document.getElementById('homeArr').textContent = addMin(fmt(train.h, train.m), 10);

  updateCD();
}

function updateCD(){
  const s = S.countSec;
  const m = Math.floor(s/60), sec = s % 60;
  document.getElementById('cdTime').textContent = `${pad(m)}:${pad(sec)}`;
  const color = s > 600 ? '#22c55e' : s > 300 ? '#eab308' : s > 120 ? '#f97316' : '#ef4444';
  document.getElementById('cdTime').style.color = color;
  document.getElementById('cdTime').classList.toggle('urgent', s <= 120);
  const maxSec = 60 * 60, ratio = Math.min(s / maxSec, 1);
  const ring = document.getElementById('ringFg');
  ring.style.strokeDashoffset = 603 * (1 - ratio);
  ring.style.stroke = color;
  document.getElementById('cdSub').textContent =
    s <= 0 ? '出発時刻です！' : s <= 120 ? '急いで！' : s <= 300 ? 'もうすぐ出発' :
    s <= 900 ? 'そろそろ準備を' : '余裕あり';
}

function openMap(e){
  e.preventDefault();
  const url=`https://www.google.com/maps/dir/?api=1`
    +`&origin=${S.lat},${S.lng}`
    +`&destination=35.62142,139.56494`
    +`&travelmode=transit`;
  window.open(url,'_blank');
}
function notify(msg){
  const el=document.getElementById('notice');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),4000);
}
function show(msg,spin){
  document.getElementById('overlay').classList.remove('hidden');
  document.getElementById('ovText').textContent=msg;
  document.getElementById('spin').style.display=spin?'block':'none';
}
function hide(){ document.getElementById('overlay').classList.add('hidden'); }
function showErr(msg){
  document.getElementById('spin').style.display='none';
  document.getElementById('ovText').textContent=msg;
  document.getElementById('retryBtn').style.display='block';
}
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
window.addEventListener('load',init);
</script>
