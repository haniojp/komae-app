<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="狛江カウントダウン">
<meta name="theme-color" content="#0a0f1e">
<title>Smart Transit Countdown</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0a0f1e;
    --bg2: #111827;
    --bg3: #1a2235;
    --card: #1e2d45;
    --border: rgba(255,255,255,0.08);
    --text: #f0f4ff;
    --muted: #8899bb;
    --accent: #3b82f6;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --orange: #f97316;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  /* Header */
  .header {
    padding: 16px 20px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .header-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .header-dest {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    background: rgba(59,130,246,0.12);
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid rgba(59,130,246,0.3);
  }

  /* Train info bar */
  .train-bar {
    margin: 4px 20px 0;
    background: var(--bg3);
    border-radius: 12px;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }
  .train-bar-label {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 2px;
  }
  .train-bar-value {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
  }
  .train-bar-divider {
    width: 1px;
    height: 32px;
    background: var(--border);
  }
  .train-type-badge {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 6px;
    background: rgba(59,130,246,0.2);
    color: #60a5fa;
    border: 1px solid rgba(59,130,246,0.3);
  }

  /* Countdown section */
  .countdown-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px 20px;
  }

  .countdown-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .countdown-ring {
    position: relative;
    width: 220px;
    height: 220px;
    margin-bottom: 16px;
  }
  .countdown-ring svg {
    position: absolute;
    top: 0; left: 0;
    transform: rotate(-90deg);
  }
  .countdown-ring-bg {
    fill: none;
    stroke: rgba(255,255,255,0.06);
    stroke-width: 6;
  }
  .countdown-ring-progress {
    fill: none;
    stroke-width: 6;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear, stroke 0.5s ease;
  }
  .countdown-inner {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .countdown-time {
    font-size: 58px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: -2px;
    transition: color 0.5s ease;
    line-height: 1;
  }
  .countdown-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.05em;
  }

  /* Map button */
  .map-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(59,130,246,0.15);
    border: 1.5px solid rgba(59,130,246,0.4);
    color: #60a5fa;
    font-size: 15px;
    font-weight: 600;
    padding: 12px 28px;
    border-radius: 50px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .map-btn:active {
    transform: scale(0.96);
    background: rgba(59,130,246,0.25);
  }
  .map-btn svg {
    width: 18px;
    height: 18px;
  }

  /* Cards section */
  .cards-section {
    padding: 0 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex-shrink: 0;
  }

  .card-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 14px;
  }
  .card-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 5px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .card-label svg { width: 12px; height: 12px; opacity: 0.7; }
  .card-value {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-value.small { font-size: 13px; }
  .card-value.accent { color: #60a5fa; }
  .card-value.green { color: var(--green); }

  .card-wide {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-wide-left .card-label { margin-bottom: 3px; }
  .card-wide-right {
    text-align: right;
  }
  .arrival-time {
    font-size: 22px;
    font-weight: 700;
    color: var(--green);
  }
  .arrival-label {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* Status / loading */
  .status-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    gap: 16px;
    padding: 40px;
  }
  .status-overlay.hidden { display: none; }
  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid rgba(59,130,246,0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status-text {
    font-size: 16px;
    font-weight: 500;
    color: var(--muted);
    text-align: center;
    line-height: 1.6;
  }
  .status-icon { font-size: 48px; }

  /* Next train alert */
  .next-train-notice {
    position: fixed;
    top: 60px;
    left: 20px;
    right: 20px;
    background: rgba(234,179,8,0.15);
    border: 1px solid rgba(234,179,8,0.4);
    border-radius: 12px;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 600;
    color: #fbbf24;
    text-align: center;
    z-index: 50;
    opacity: 0;
    transform: translateY(-10px);
    transition: all 0.3s;
  }
  .next-train-notice.show {
    opacity: 1;
    transform: translateY(0);
  }

  /* Pulse animation on urgent */
  @keyframes pulse-red {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
  .urgent { animation: pulse-red 1s ease-in-out infinite; }

  .refresh-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    margin-top: 8px;
  }
</style>
</head>

// ============================================================
// Geo & Location
// ============================================================
function init() {
  showOverlay('現在地を取得中…\n位置情報の許可をお願いします', true);
  document.getElementById('retryBtn').style.display = 'none';

  if (!navigator.geolocation) {
    showError('このブラウザは位置情報に\n対応していません');
    return;
  }

  navigator.geolocation.getCurrentPosition(
    onGeoSuccess,
    onGeoError,
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 30000 }
  );
}

function onGeoSuccess(pos) {
  state.lat = pos.coords.latitude;
  state.lng = pos.coords.longitude;

  showOverlay('場所を特定中...', true);
  reverseGeocode(state.lat, state.lng);
}

function onGeoError(err) {
  // GPS失敗時は新宿をデフォルトにして続行
  state.lat = 35.6896;
  state.lng = 139.7006;
  state.locationName = '新宿区（デフォルト）';
  computeAndStart();
}

async function reverseGeocode(lat, lng) {
  try {
    // 国土地理院の逆ジオコーディングAPI（無料・API Key不要）
    const url = `https://mreversegeocoder.gsi.go.jp/reverse-geocoder/LonLatToAddress?lon=${lng}&lat=${lat}`;
    const res = await fetch(url);
    const data = await res.json();
    if (data && data.results) {
      const r = data.results;
      state.locationName = (r.muniCd ? '' : '') + (r.lv01Nm || '') ;
      // 市区町村名を抽出
      const muniName = r.lv01Nm || '';
      state.locationName = muniName || '現在地';
    }
  } catch(e) {
    state.locationName = '現在地';
  }
  computeAndStart();
}

// ============================================================
// Station & Walk
// ============================================================
function findNearestStation(lat, lng) {
  let minDist = Infinity, nearest = STATIONS[0];
  for (const st of STATIONS) {
    const d = calcDistance(lat, lng, st.lat, st.lng);
    if (d < minDist) { minDist = d; nearest = st; }
  }
  return { station: nearest, distanceM: Math.round(minDist) };
}

function calcDistance(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ============================================================
// Timetable
// ============================================================
function isHoliday() {
  const d = new Date();
  const day = d.getDay();
  return day === 0 || day === 6;
}

function getTimetable() {
  return isHoliday() ? TIMETABLE.holiday : TIMETABLE.weekday;
}

function toMinutes(h, m) { return h * 60 + m; }

function findNextTrain(afterMinutes) {
  const table = getTimetable();
  const now = afterMinutes;
  // 現在時刻以降の電車を探す
  for (let i = 0; i < table.length; i++) {
    const t = table[i];
    const tMin = toMinutes(t.h, t.m);
    if (tMin >= now) return { train: t, index: i };
  }
  // 翌日最初の電車
  return { train: table[0], index: 0 };
}

function findTrainAfterIndex(index) {
  const table = getTimetable();
  const next = (index + 1) % table.length;
  return { train: table[next], index: next };
}

function fmtTime(h, m) {
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

function addMinutes(timeStr, addMin) {
  const [h, m] = timeStr.split(':').map(Number);
  const total = h * 60 + m + addMin;
  const nh = Math.floor(total / 60) % 24;
  const nm = total % 60;
  return `${String(nh).padStart(2,'0')}:${String(nm).padStart(2,'0')}`;
}

// ============================================================
// Core compute
// ============================================================
function computeAndStart() {
  const now = new Date();
  const nowMin = now.getHours() * 60 + now.getMinutes();
  const nowSec = now.getSeconds();
  const nowTotalSec = nowMin * 60 + nowSec;

  // 最寄り駅
  const { station, distanceM } = findNearestStation(state.lat, state.lng);
  state.nearestStation = station.name;
  state.stationLat = station.lat;
  state.stationLng = station.lng;
  state.distanceM = distanceM;

  // 徒歩時間（60m/分）
  const walkTotalSec = Math.ceil((distanceM / 60) * 60);
  state.walkMinutes = Math.floor(walkTotalSec / 60);
  state.walkSeconds = walkTotalSec % 60;

  // 現在地が狛江駅より向こうの場合は新宿から乗る想定
  // 次の電車を探す（徒歩時間を考慮して間に合う電車）
  const { train, index } = findNextTrain(nowMin);
  state.currentTrain = train;
  state.trainIndex = index;

  // カウントダウン = (電車出発 - 現在時刻) - 徒歩時間
  const trainTotalSec = (train.h * 3600 + train.m * 60);
  let remainSec = trainTotalSec - nowTotalSec - walkTotalSec;

  // 残り時間がマイナスまたは5分未満なら次の電車へ
  if (remainSec < 300) {
    const { train: nextT, index: nextI } = findTrainAfterIndex(index);
    state.currentTrain = nextT;
    state.trainIndex = nextI;
    const nextTrainSec = (nextT.h * 3600 + nextT.m * 60);
    remainSec = nextTrainSec - nowTotalSec - walkTotalSec;
  }

  state.countdownSec = Math.max(0, remainSec);

  // 次の電車も取得
  const { train: nextTrain } = findTrainAfterIndex(state.trainIndex);
  state.nextTrain = nextTrain;

  updateUI();
  hideOverlay();
  startCountdown();
}

// ============================================================
// Countdown
// ============================================================
function startCountdown() {
  if (state.timerInterval) clearInterval(state.timerInterval);
  state.timerInterval = setInterval(tick, 1000);
}

function tick() {
  state.countdownSec--;

  if (state.countdownSec <= 300 && state.countdownSec > 299) {
    // 5分切ったら次の電車へ
    switchToNextTrain();
    return;
  }

  if (state.countdownSec < 0) {
    switchToNextTrain();
    return;
  }

  updateCountdownDisplay();
}

function switchToNextTrain() {
  const { train, index } = findTrainAfterIndex(state.trainIndex);
  state.currentTrain = train;
  state.trainIndex = index;

  const now = new Date();
  const nowTotalSec = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
  const walkTotalSec = state.walkMinutes * 60 + state.walkSeconds;
  const trainSec = train.h * 3600 + train.m * 60;
  state.countdownSec = Math.max(0, trainSec - nowTotalSec - walkTotalSec);

  const { train: nextTrain } = findTrainAfterIndex(state.trainIndex);
  state.nextTrain = nextTrain;

  showNextTrainNotice();
  updateUI();
}

// ============================================================
// UI Updates
// ============================================================
function updateUI() {
  const t = state.currentTrain;

  document.getElementById('currentLocation').textContent = state.locationName;
  document.getElementById('nearestStation').textContent = state.nearestStation + '駅';

  const wm = state.walkMinutes;
  const ws = state.walkSeconds;
  document.getElementById('walkTime').textContent =
    ws > 0 ? `${wm}分${ws}秒` : `${wm}分`;

  document.getElementById('depStation').textContent = state.nearestStation;
  document.getElementById('depTime').textContent = fmtTime(t.h, t.m);
  document.getElementById('trainType').textContent = t.type;

  document.getElementById('nextTrainTime').textContent = fmtTime(t.h, t.m);
  document.getElementById('komaeArrival').textContent = t.komaeArr;
  document.getElementById('routeInfo').textContent = t.via;
  document.getElementById('homeArrival').textContent = addMinutes(t.komaeArr, 10);

  updateCountdownDisplay();
}

function updateCountdownDisplay() {
  const s = state.countdownSec;
  const m = Math.floor(s / 60);
  const sec = s % 60;
  const display = `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;

  document.getElementById('countdownDisplay').textContent = display;

  // Color logic
  let color;
  if (s > 600) color = '#22c55e';       // green: 10分以上
  else if (s > 300) color = '#eab308';  // yellow: 5-10分
  else if (s > 120) color = '#f97316';  // orange: 2-5分
  else color = '#ef4444';                // red: 2分以下

  const el = document.getElementById('countdownDisplay');
  el.style.color = color;
  el.classList.toggle('urgent', s <= 120);

  // Ring progress
  const total = state.currentTrain ?
    Math.max(state.countdownSec, 1) : 1;
  const maxSec = 30 * 60; // 最大30分で満タン
  const ratio = Math.min(s / maxSec, 1);
  const circumference = 628;
  const offset = circumference * (1 - ratio);
  const ring = document.getElementById('ringProgress');
  ring.style.strokeDashoffset = offset;
  ring.style.stroke = color;

  // Sub text
  const sub = s <= 0 ? '出発時刻です！' :
    s <= 120 ? '急いで！' :
    s <= 300 ? 'そろそろ準備を' :
    '余裕あり';
  document.getElementById('countdownSub').textContent = sub;
}

function showNextTrainNotice() {
  const el = document.getElementById('nextTrainNotice');
  el.textContent = `⏭ 次の電車 ${fmtTime(state.currentTrain.h, state.currentTrain.m)} に切り替えました`;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function openMap(e) {
  e.preventDefault();
  const dest = '35.6219,139.5655'; // 狛江駅
  const url = `https://yahoo-map.app.link/map?from=${state.lat},${state.lng}&to=${dest}`;
  // Yahoo Mapが開けない場合はGoogle Mapsにフォールバック
  const googleUrl = `https://www.google.com/maps/dir/?api=1&origin=${state.lat},${state.lng}&destination=35.6219,139.5655&travelmode=walking`;
  window.open(googleUrl, '_blank');
}

// ============================================================

// ============================================================
function showOverlay(msg, spin) {
  document.getElementById('overlay').classList.remove('hidden');
  document.getElementById('overlayText').textContent = msg;
  document.getElementById('spinner').style.display = spin ? 'block' : 'none';
  document.getElementById('overlayIcon').style.display = spin ? 'none' : 'block';
}
function hideOverlay() {
  document.getElementById('overlay').classList.add('hidden');
}
function showError(msg) {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('overlayIcon').style.display = 'block';
  document.getElementById('overlayIcon').textContent = '⚠️';
  document.getElementById('overlayText').textContent = msg;
  document.getElementById('retryBtn').style.display = 'block';
}
